name: Selenium Tests Suite with Allure Report

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set Up Java
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run Tests
        # El continue-on-error es vital para que el reporte se genere aunque fallen los tests
        run: mvn clean verify -DskipTests=false
        continue-on-error: true

      - name: Install Allure
        if: always()
        run: |
          ALLURE_VERSION=2.24.0
          wget https://github.com/allure-framework/allure2/releases/download/${ALLURE_VERSION}/allure-${ALLURE_VERSION}.tgz
          tar -zxvf allure-${ALLURE_VERSION}.tgz
          echo "$PWD/allure-${ALLURE_VERSION}/bin" >> $GITHUB_PATH

      - name: Generate Allure Report
        if: always()
        run: |
          echo "=== Verificando archivos de resultados ==="
          # Esto nos confirmará si el pom.xml generó los JSON en la raíz
          ls -R allure-results || echo "ADVERTENCIA: No se encontró la carpeta allure-results"
          
          echo "=== Generando Reporte Final ==="
          allure generate allure-results --clean -o allure-report

      - name: Deploy To GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-report

      - name: Show Allure Report URL
        if: always()
        run: |
          echo "##  Reporte de Automatización" >> $GITHUB_STEP_SUMMARY
          echo "El reporte ha sido actualizado exitosamente." >> $GITHUB_STEP_SUMMARY
          echo "[ CLIC AQUÍ PARA VER EL REPORTE](https://santosalan198-glitch.github.io/NopCommerce/)" >> $GITHUB_STEP_SUMMARY
          
          
