name: Selenium Tests Suite with Allure Report

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set Up Java
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run Tests
        run: mvn clean verify -DskipTests=false
        continue-on-error: true

      - name: Install Allure
        if: always()
        run: |
          ALLURE_VERSION=2.24.0
          wget https://github.com/allure-framework/allure2/releases/download/${ALLURE_VERSION}/allure-${ALLURE_VERSION}.tgz
          tar -zxvf allure-${ALLURE_VERSION}.tgz
          echo "$PWD/allure-${ALLURE_VERSION}/bin" >> $GITHUB_PATH

      - name: Get Allure history
        if: always()
        continue-on-error: true
        run: |
          # Creamos la carpeta de resultados si no existe
          mkdir -p allure-results/history
          # Intentamos descargar el historial de la ejecución anterior desde GitHub Pages
          # Usamos --fail para que no cree archivos vacíos si no existen
          curl -L -f https://raw.githubusercontent.com/${{ github.repository }}/gh-pages/history/history.json -o allure-results/history/history.json || echo "No hay historial previo"
          curl -L -f https://raw.githubusercontent.com/${{ github.repository }}/gh-pages/history/trends.json -o allure-results/history/trends.json || echo "No hay tendencias previas"
          curl -L -f https://raw.githubusercontent.com/${{ github.repository }}/gh-pages/history/categories-trend.json -o allure-results/history/categories-trend.json || echo "No hay categorías previas"

      - name: Generate Allure Report
        if: always()
        run: |
          echo "=== Verificando archivos de resultados ==="
          ls -R allure-results || echo "ADVERTENCIA: No se encontró la carpeta allure-results"
          
          echo "=== Generando Reporte Final con Historial ==="
          allure generate allure-results --clean -o allure-report

      - name: Deploy To GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-report

      - name: Show Allure Report URL
        if: always()
        run: |
          echo "## 📈 Reporte de Automatización con Historial" >> $GITHUB_STEP_SUMMARY
          echo "El reporte ha sido actualizado. Si es la segunda vez que corres con este cambio, verás la gráfica de tendencia." >> $GITHUB_STEP_SUMMARY
          echo "[👉 CLIC AQUÍ PARA VER EL REPORTE](https://santosalan198-glitch.github.io/NopCommerce/)" >> $GITHUB_STEP_SUMMARY